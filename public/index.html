<!DOCTYPE html>
<html>
  <head>
    <title>GPTS Video App</title>
    <meta charset="UTF-8" />
  </head>
  <body style="font-family: sans-serif; padding: 40px;">
    <h1>GPTS E-Commerce Video App</h1>
    <p>Panel básico para generar videos desde Shopify.</p>

    <label>Tipo de video:</label>
    <select id="tipo">
      <option value="review">Review</option>
      <option value="testimonio">Testimonio</option>
      <option value="tutorial">Tutorial</option>
      <option value="presentacion">Presentación</option>
    </select>

    <br /><br />

    <label>Prompt / Guion:</label><br />
    <textarea id="prompt" rows="6" cols="60"
      placeholder="Escribe aquí la idea del video..."></textarea>

    <br /><br />
    <button onclick="generar()">Generar video</button>

    <h3>Resultado</h3>
    <pre id="resultado"></pre>

    <script>
      async function generar() {
        const tipo = document.getElementById("tipo").value;
        const promptBase = document.getElementById("prompt").value;

        const prompt = `[Tipo: ${tipo}] ${promptBase}`;

        const res = await fetch("/api/runpod/generar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
